apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "removecookie-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "removecookie sink"
    description: "Removes a browser cookie"
    type: "object"
    properties:
      name:
        title: "Name"
        description: "Name of the cookie"
        type: "string"
        default: "AssimblyCookie"
      domain:
        title: "Domain"
        description: "Domain"
        type: "string"
        default: "org.assimbly"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "bean://flowCookieStore?method=removeStringAsCookie(${exchange},'{{name}}','{{domain}}')"
      routeConfigurationId: "{{routeConfigurationId}}"
