apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "texttobase64-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "texttobase64 sink"
    description: "Converts text to a base64 encoded string"
    type: "object"
    properties:
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - marshal:
                base64: {}
