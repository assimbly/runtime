apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "springai-chat-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"

spec:
  definition:
    title: "Spring AI Chat Sink"
    description: "Send messages to a Spring AI chat model"
    type: "object"
    properties:
      in:
        type: "string"
        default: "kamelet:source"
      routeId:
        type: "string"
        default: "springai-chat-sink"
      chatModel:
        title: "Chat Model Bean Name"
        description: "Name of the Spring AI ChatModel bean in the Camel registry (e.g. #springAiChatModel)"
        type: "string"
        default: "#springAiChatModel"
      systemMessage:
        title: "System Message"
        description: "Optional system message (instructions) to prepend to every chat request"
        type: "string"
        default: ""

  dependencies:
    - "camel:kamelet"
    - "camel:spring-ai"

  template:
    route:
      from:
        uri: "{{in}}"
        steps:
          - convertBodyTo:
              type: String
          - to:
              uri: "spring-ai-chat://{{routeId}}?chatModel={{chatModel}}&systemMessage={{systemMessage}}"
