apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "splitandaggregate-router"
  labels:
    camel.apache.org/kamelet.type: "router"
spec:
  definition:
    title: "splitandaggregate-router"
    description: "Splits message by an expression and aggregate result by XML or JSON"
    type: "object"
    properties:
      language:
        title: "Language"
        description: "Language"
        type: "string"
      expression:
        title: "Expression"
        description: "Expression"
        type: "string"
      parallelProcessing:
        title: "Parallel Processing"
        description: "Parallel Processing of split"
        type: "boolean"
        default: false
      streaming:
        title: "Streaming"
        description: "Use Streaming"
        type: "boolean"
        default: false
      aggregateType:
        title: "Aggregate Type"
        description: "Content-Type to use for aggregation (XML or JSON)"
        type: "string"
        default: "xml"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out_split:
        title: "OutSplit"
        description: "Out Split Rule"
        type: "string"
      out_default:
        title: "Out Default Rule"
        description: "Out Default Rule"
        type: "string"
        default: "mock:0"
      routeId:
        title: "Route ID"
        type: "string"
      stepId:
        title: "Step ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    beans:
      - name: "Namespace"
        type: "#class:org.apache.camel.support.builder.Namespaces"
        properties:
          h: "http://www.w3.org/TR/html4/"
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
          - step:
              id: "{{stepId}}"
              steps:
                - setProperty:
                    name: "Aggregate-Type"
                    constant:
                      expression: "{{aggregateType}}"
                - split:
                    aggregationStrategy: "AggregateStrategy"
                    parallelProcessing: "{{parallelProcessing}}"
                    streaming: "{{streaming}}"
                    language:
                      language: "{{language}}"
                      expression: "{{expression}}"
                    steps:
                      - setHeader:
                          name: "CamelSplitIndex"
                          simple: "${exchangeProperty.CamelSplitIndex}"
                      - setHeader:
                          name: "CamelSplitSize"
                          simple: "${exchangeProperty.CamelSplitSize}"
                      - setHeader:
                          name: "CamelSplitComplete"
                          simple: "${exchangeProperty.CamelSplitComplete.toString().trim()}"
                      - convertBodyTo:
                          type: "java.lang.String"
                      - to: "{{out_split}}"
                - to:
                    uri: "{{out_default}}"