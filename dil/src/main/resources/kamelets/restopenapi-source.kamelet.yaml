apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "restopenapi-source"
  labels:
    camel.apache.org/kamelet.type: "source"
spec:
  definition:
    title: "restopenapi source"
    description: "Configures rest producers from OpenApi (Open API) specification document."
    type: "object"
    properties:
      path:
        title: "Path"
        description: "Path"
        type: "string"
      options:
        title: "Options"
        description: "Endpoint options"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "rest-openapi:{{path}}?{{?options}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "{{out}}"