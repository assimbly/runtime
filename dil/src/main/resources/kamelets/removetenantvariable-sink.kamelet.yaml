apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "removetenantvariable-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "remove tenant variable action"
    description: "remove tenant variable from mongodb"
    type: "object"
    properties:
      path:
        title: "path"
        description: "path of the URI (tenant variable name)"
        type: "string"
        default: "dummy"
      tenantDbName:
        title: "TenantDbName"
        description: "Tenant dbname of the tenant variable"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - toD:
                uri: "tenantvariables://{{path}}?operation=DELETE&tenantDbName={{tenantDbName}}"
      routeConfigurationId: "{{routeConfigurationId}}"
