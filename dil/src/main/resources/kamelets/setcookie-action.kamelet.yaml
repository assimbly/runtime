apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "setcookie-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "setcookie action"
    description: "Sets browser cookie"
    type: "object"
    properties:
      path:
        title: "Path"
        description: "Path"
        type: "string"
        default: "AssimblyCookie"
      domain:
        title: "Domain"
        description: "Domain"
        type: "string"
        default: "org.assimbly"
      value:
        title: "Value"
        description: "Value"
        type: "string"
      cookiePath:
        title: "Cookie Path"
        description: "Cookie Path"
        type: "string"
        default: "0"
      isSecure:
        title: "Is Secure"
        description: "Is Secure"
        type: "string"
        default: false
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "bean://flowCookieStore?method=addStringAsCookie(${exchange},'{{path}}','{{value}}','{{domain}}','{{cookiePath}}',{{isSecure}})"
            - to:
                uri: "{{out}}"
