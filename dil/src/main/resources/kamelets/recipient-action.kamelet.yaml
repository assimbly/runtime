apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "recipient-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "recipient action"
    description: "Sends a copy of the message to the recipient (use the recipient\
      \ router when using more recipients)"
    type: "object"
    properties:
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "{{out}}"
      routeConfigurationId: "{{routeConfigurationId}}"
