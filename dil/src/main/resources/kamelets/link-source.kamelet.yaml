apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "link-source"
  labels:
    camel.apache.org/kamelet.type: "source"
spec:
  definition:
    title: "link source"
    description: "Link steps"
    type: "object"
    properties:
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "kamelet:source"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "{{out}}"