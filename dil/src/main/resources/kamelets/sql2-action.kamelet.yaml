apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "sql2-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "sql2 action"
    description: "SQL (Default Camel component) to connect to a database and execute\
      \ queries"
    type: "object"
    properties:
      query:
        title: "SQL Query"
        description: "SQL Query"
        type: "string"
      dataSource:
        title: "DataSource"
        description: "DataSource, ID of the connection"
        type: "string"
      outputHeader:
        title: "OutputHeader"
        description: "Set query output to a header"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - toD:
                uri: "sql:{{query}}?dataSource=#{{dataSource}}&outputHeader={{?outputHeader}}"
            - to:
                uri: "{{out}}"
