apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "pdftotext-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "pdf to text action"
    description: "PDF to text in message"
    type: "object"
    properties:
      routeId:
        title: "routeId"
        description: "ID of the step"
        type: "string"
        default: "dummy"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "pdftotext:path"