apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "xslt-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "xslt sink"
    description: "Apply XSLT on message"
    type: "object"
    properties:
      path:
        title: "Path"
        description: "Path"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "xslt-saxon:{{path}}?saxonExtensionFunctions=#uuid-function"