apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "as2-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "as2 sink"
    description: "Sends documents to a partner using the AS2 protocol"
    type: "object"
    properties:
      options:
        title: "options (query parameters)"
        description: "Endpoint URI"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "as2://client/send?{{?options}}"

