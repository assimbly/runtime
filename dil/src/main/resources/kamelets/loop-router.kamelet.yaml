apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "loop-router"
  labels:
    camel.apache.org/kamelet.type: "router"
spec:
  definition:
    title: "loop-router"
    description: "Loops based on a expression"
    type: "object"
    properties:
      copy:
        title: "Copy"
        description: "If the copy attribute is true, a copy of the input Exchange\
          \ is used for each iteration. That means each iteration will start from\
          \ a copy of the same message."
        type: "boolean"
        default: false
      language:
        title: "Language"
        description: "Language"
        type: "string"
      expression:
        title: "Expression"
        description: "Simple Expression to define how many times we should loop. Notice\
          \ the expression is only evaluated once, and should return a number as how\
          \ many times to loop."
        type: "string"
        default: "1"
      out_loop:
        title: "Out Loop Endpoint"
        description: "Out Loop Endpoint"
        type: "string"
      out_default:
        title: "Out Default Rule"
        description: "Out Default Rule"
        type: "string"
        default: "mock:0"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - loop:
                copy: "{{copy}}"
                expression:
                  language:
                    language: "{{language}}"
                    expression: "{{expression}}"
                steps:
                - to: "{{out_loop}}"
            - to:
                uri: "{{out_default}}"
      routeConfigurationId: "{{routeConfigurationId}}"
