apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "setheaders-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "setmessage sink"
    description: "Set multiple headers on a message"
    type: "object"
    properties:
      headers:
        title: "Headers"
        description: "Headers"
        type: "string"
        default: 0
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - setProperty:
                name: "assimbly.headers"
                constant: "{{headers}}"
            - process:
                ref: "SetHeadersProcessor"
