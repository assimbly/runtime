apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "unzip-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "unzip sink"
    description: "Unzips a message"
    type: "object"
    properties:
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
          - step:
              id: "{{routeId}}"
              steps:
                - process:
                    ref: "Unzip"
                - split:
                    streaming: true
                    expression:
                      simple: "${body}"
                    steps:
                      - setHeader:
                          name: "CamelFileName"
                          simple: "${body[name]}"
                      - setBody:
                          simple: "${body[content]}"