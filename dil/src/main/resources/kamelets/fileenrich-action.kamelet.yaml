apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "fileenrich-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "file enrich action"
    description: "Enrich a file from a directory"
    type: "object"
    properties:
      path:
        title: "path"
        description: "path"
        type: "string"
      options:
        title: "options"
        description: "options"
        type: "string"
      timeout:
        title: "Time Out"
        description: "Time Out"
        type: "string"
        default: "10000"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - setProperty:
                name: "Enrich-Type"
                simple:
                  expression: "application/override"
            - pollEnrich:
                timeout: "{{timeout}}"
                aggregationStrategy: "#CurrentEnrichStrategy"
                simple:
                  expression: "file:{{path}}?noop=true&idempotent=false&bridgeErrorHandler=true&{{?options}}"
            - to:
                uri: "{{out}}"
