apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "setbodybyheaders-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "setbodybyheaders sink"
    description: "Set body as key/value map (comma-separated) from all headers"
    type: "object"
    properties:
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - setBody:
                groovy: "headers.collect { k, v -> \"$k=$v\" }.join(',')"
