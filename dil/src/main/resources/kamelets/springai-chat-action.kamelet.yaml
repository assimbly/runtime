apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "springai-chat-action"
  labels:
    camel.apache.org/kamelet.type: "action"

spec:
  definition:
    title: "Spring AI Chat Action"
    description: "Send a prompt to a Spring AI chat model and receive the AI response"
    type: "object"
    properties:
      in:
        type: "string"
        default: "kamelet:source"
      out:
        type: "string"
        default: "kamelet:sink"
      routeId:
        type: "string"
        default: "springai-chat"
      chatModel:
        title: "Chat Model Bean Name"
        description: "Name of the Spring AI ChatModel bean in the Camel registry (e.g. #springAiChatModel)"
        type: "string"
        default: "#springAiChatModel"
      systemMessage:
        title: "System Message"
        description: "Optional system message (instructions) to prepend to every chat request"
        type: "string"
        default: ""

  dependencies:
    - "camel:kamelet"
    - "camel:spring-ai"

  template:
    route:
      from:
        uri: "{{in}}"
        steps:
          - convertBodyTo:
              type: String

          - to:
              uri: "log:springai-in?showAll=true&multiline=true"

          - to:
              uri: "spring-ai-chat://{{routeId}}?chatModel={{chatModel}}&systemMessage={{systemMessage}}"

          - to:
              uri: "log:springai-out?showAll=true&multiline=true"

          - to:
              uri: "{{out}}"