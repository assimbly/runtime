apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "setbody-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "setbody sink"
    description: "Sets the body of message by an expression"
    type: "object"
    properties:
      language:
        title: "Language"
        description: "Set the expression language"
        type: "string"
        default: "constant"
      expression:
        title: "Expression"
        description: "Set the content of the body"
        type: "string"
        default: ""
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - setBody:
                language:
                  language: "{{language}}"
                  expression: "{{expression}}"
      routeConfigurationId: "{{routeConfigurationId}}"
