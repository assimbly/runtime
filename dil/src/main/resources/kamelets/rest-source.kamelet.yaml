apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "rest-source"
  labels:
    camel.apache.org/kamelet.type: "source"
spec:
  definition:
    title: "rest source"
    description: "Host a REST Endpoint"
    type: "object"
    properties:
      method:
        title: "Method"
        description: "HTTP Method (GET, POST, PUT, DELETE, TRACE, OPTIONS, PATCH CONNECT)"
        type: "string"
      path:
        title: null
        description: "."
        type: "string"
      options:
        title: "Options"
        description: "Endpoint options"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "rest:{{method}}:{{path}}?{{options}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "{{out}}"
