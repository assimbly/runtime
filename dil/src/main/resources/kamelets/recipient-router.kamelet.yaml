apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "recipient-router"
  labels:
    camel.apache.org/kamelet.type: "router"
spec:
  definition:
    title: "recipient router"
    description: "Sends a copy of the message to all recipients in comma-separated\
      \ list (out_list)"
    type: "object"
    properties:
      out_list:
        title: "Out list"
        description: "List of comma-separated destinations"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - recipientList:
                constant:
                  expression: "{{out_list}}"