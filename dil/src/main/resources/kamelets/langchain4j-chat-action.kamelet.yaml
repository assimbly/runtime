apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "langchain4j-chat-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "langchain4j-chat action"
    description: "blabla"
    type: "object"
    properties:
      path:
        title: "Path"
        description: "Path"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
    - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
          - step:
              id: "{{routeId}}"
              steps:
                - to:
                    uri: "langchain4j-chat://{{path}}?chatModel=#geminiChatModel"
                - to:
                    uri: "{{out}}"