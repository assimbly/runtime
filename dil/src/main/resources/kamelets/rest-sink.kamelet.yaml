apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "trace-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "rest action"
    description: "Calls a REST Endpoint"
    type: "object"
    properties:
      method:
        title: "Method"
        description: "HTTP Method (GET, POST, PUT, DELETE, TRACE,OPTIONS, PATCH, CONNECT)"
        type: "string"
      path:
        title: "Path"
        description: "Path"
        type: "string"
      options:
        title: "Options"
        description: "Endpoint options"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "rest:{{method}}:{{path}}?{{?options}}"
