apiVersion: camel.apache.org/v1
kind: Kamelet
metadata:
  name: zip-sink
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "zip sink"
    description: |-
      Zips a message
    type: object
    properties:
      routeId:
        title: RouteID
        description: ID of the route
        type: string
        default: dummy
  dependencies:
    - "camel:kamelet"
  template:
    route:
      from:
        uri: "kamelet:source"
        steps:
          - marshal:
              zipFile:
                id: zipFile-{{routeId}}
          - setHeader:
              name: Content-Disposition
              simple: attachment; filename="${header.CamelFileName}"

