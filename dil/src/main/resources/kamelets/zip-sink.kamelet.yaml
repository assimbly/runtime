apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "zip-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "zip sink"
    description: "Zips a message"
    type: "object"
    properties:
      routeId:
        title: "RouteID"
        description: "ID of the route"
        type: "string"
        default: "dummy"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - marshal:
                zipFile:
                  id: "zipFile-{{routeId}}"
            - setHeader:
                name: "Content-Type"
                simple: " application/zip"
            - setHeader:
                name: "Content-Disposition"
                simple: "attachment; filename=\"${header.CamelFileName}\""
      routeConfigurationId: "{{routeConfigurationId}}"
