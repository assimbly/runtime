apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "flv-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "flv sink"
    description: "Transform FLV (Fixed length)"
    type: "object"
    properties:
      routeId:
        title: "routeId"
        description: "ID of route (flowId + stepId)"
        type: "string"
        default: "dummy"
      options:
        title: "options (query parameterS)"
        description: "Endpoint URI"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - to:
                uri: "flv:{{routeId}}?{{?options}}"
      routeConfigurationId: "{{routeConfigurationId}}"
