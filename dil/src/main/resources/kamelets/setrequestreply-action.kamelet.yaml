apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "setrequestreply-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "setrequestreply action"
    description: "Set the exchange pattern to inOut (request and reply)"
    type: "object"
    properties:
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - setExchangePattern: "InOut"
            - to:
                uri: "{{out}}"
