apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "simplevalidator-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "Simple validator action"
    description: "Apply Simple expression validation on a message"
    type: "object"
    properties:
      path:
        title: "Expression"
        description: "Simple expression"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - validate:
                expression:
                  simple: "{{expression}}"
            - to:
                uri: "{{out}}"