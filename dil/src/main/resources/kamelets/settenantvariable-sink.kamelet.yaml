apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "settenantvariable-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "set tenant variable action"
    description: "set tenant variable on mongodb"
    type: "object"
    properties:
      path:
        title: "path"
        description: "path of the URI (tenant variable name)"
        type: "string"
        default: "dummy"
      language:
        title: "Language"
        description: "Language of the expression"
        type: "string"
        default: "simple"
      value:
        title: "Value"
        description: "Value of the tenant variable"
        type: "string"
      encrypt:
        title: "Encrypt"
        description: "To encrypt the tenant variable"
        type: "boolean"
        default: false
      groupName:
        title: "GroupName"
        description: "Group name of the flow"
        type: "string"
        default: "Groupless"
      flowName:
        title: "FlowName"
        description: "Flow name"
        type: "string"
      tenantDbName:
        title: "TenantDbName"
        description: "Tenant dbname of the tenant variable"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - toD:
                uri: "tenantvariables://{{path}}?operation=SET&language={{language}}&value=RAW({{value}})&encrypt={{encrypt}}&groupName=RAW({{groupName}})&flowName=RAW({{flowName}})&tenantDbName=RAW({{tenantDbName}})"

