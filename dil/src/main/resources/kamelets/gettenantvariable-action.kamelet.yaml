apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "gettenantvariable-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "get tenant variable action"
    description: "get tenant variable from mongodb"
    type: "object"
    properties:
      path:
        title: "path"
        description: "path of the URI (tenant variable name)"
        type: "string"
        default: "dummy"
      headerName:
        title: "HeaderName"
        description: "Header name where the tenant variable value will be stored"
        type: "string"
      tenantDbName:
        title: "TenantDbName"
        description: "Tenant dbname of the tenant variable"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - toD:
                uri: "tenantvariables://{{path}}?operation=GET&headerName={{headerName}}&tenantDbName={{tenantDbName}}"
            - to:
                uri: "{{out}}"

