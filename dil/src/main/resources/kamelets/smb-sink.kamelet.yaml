apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "smb-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "smb sink"
    description: "Send messages to a SMB directory"
    type: "object"
    properties:
      path:
        title: "path"
        description: "path of component"
        type: "string"
      options:
        title: "options (query parameterS)"
        description: "Endpoint URI"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - toD:
                uri: "smb:{{path}}?{{?options}}"
      routeConfigurationId: "{{routeConfigurationId}}"
