apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "log-action"
  labels:
    camel.apache.org/kamelet.type: "action"
spec:
  definition:
    title: "log action"
    description: "Logs e message"
    type: "object"
    properties:
      routeId:
        title: "routeId"
        description: "path of component"
        type: "string"
        default: "dummy"
      showHeaders:
        title: "Show Headers"
        description: "Show all message headers"
        type: "boolean"
        default: false
      showBody:
        title: "Show Body"
        description: "Show message body"
        type: "boolean"
        default: false
      showException:
        title: "Show Exception"
        description: "Show all exceptions"
        type: "boolean"
        default: false
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - toD:
                uri: "log:org.assimbly.runtime.{{flowId}}?skipBodyLineSeparator=false&multiline=true&showHeaders={{showHeaders}}&showBody={{showBody}}&showBodyType={{showBody}}&showException={{showException}}&showStackTrace={{showException}}&showCaughtException={{showException}}"
            - to:
                uri: "{{out}}"