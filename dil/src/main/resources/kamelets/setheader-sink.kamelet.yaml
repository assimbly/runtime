apiVersion: "camel.apache.org/v1"
kind: "Kamelet"
metadata:
  name: "setheader-sink"
  labels:
    camel.apache.org/kamelet.type: "sink"
spec:
  definition:
    title: "setheader sink"
    description: "Set header"
    type: "object"
    properties:
      path:
        title: "Path"
        description: "Path with the name of the header"
        type: "string"
      language:
        title: "language"
        description: "Name of the header"
        type: "string"
        default: "simple"
      value:
        title: "Value"
        description: "Value/expression"
        type: "string"
      in:
        title: "Source Endpoint"
        type: "string"
        default: "kamelet:source"
      out:
        title: "Sink Endpoint"
        type: "string"
        default: "kamelet:sink"
      routeId:
        title: "Route ID"
        type: "string"
      routeConfigurationId:
        title: "Route Configuration ID"
        type: "string"
        default: "0"
  dependencies:
  - "camel:kamelet"
  template:
    route:
      routeConfigurationId: "{{routeConfigurationId}}"
      from:
        uri: "{{in}}"
        steps:
        - step:
            id: "{{routeId}}"
            steps:
            - setHeader:
                name: "{{path}}"
                language:
                  language: "{{language}}"
                  expression: "{{value}}"